apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Must deploy before any Ingress with TLS annotations,
    # and before the ClusterIssuer manifest is applied.
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: "v1.17.x"
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/helm/platform/cert-manager/values-dev.yaml
    - repoURL: https://github.com/mb-news-summary/news-feed-infra.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
