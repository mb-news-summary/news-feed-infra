apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform tools — monitoring, logging, secrets, CI runners

  sourceRepos:
    - https://github.com/mb-news-summary/news-feed-infra.git
    - https://kubernetes.github.io/ingress-nginx
    - https://charts.jetstack.io
    - https://prometheus-community.github.io/helm-charts
    - https://elastic.github.io/helm-charts
    - https://fluent.github.io/helm-charts
    - https://charts.external-secrets.io
    - https://actions-runner-controller.github.io/actions-runner-controller
    - https://helm.grafana.com

  destinations:
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: logging
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: arc-systems
      server: https://kubernetes.default.svc
    - namespace: arc-runners
      server: https://kubernetes.default.svc

  # Platform tools need broad cluster-level permissions.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
