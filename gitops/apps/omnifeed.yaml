apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: omnifeed
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: omnifeed

  source:
    repoURL: https://github.com/your-org/news-feed-infra.git
    targetRevision: main
    path: helm/omnifeed
    helm:
      releaseName: omnifeed
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: omnifeed

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  # Show health even for custom CRDs (ExternalSecret).
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
