apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker-fetcher
  labels:
    app: worker-fetcher
    app.kubernetes.io/part-of: omnifeed
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: worker-fetcher
  template:
    metadata:
      labels:
        app: worker-fetcher
        app.kubernetes.io/part-of: omnifeed
    spec:
      serviceAccountName: omnifeed-worker-fetcher
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker-fetcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Always" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
