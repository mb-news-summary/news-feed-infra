apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnifeed-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: omnifeed
  annotations:
    # Workload Identity: allows this KSA to impersonate the GSA,
    # which has roles/secretmanager.secretAccessor and roles/cloudtrace.agent.
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | quote }}
automountServiceAccountToken: true
