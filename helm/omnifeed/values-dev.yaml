# helm/omnifeed/values-dev.yaml
#
# Dev environment overrides. Applied on top of values.yaml.
# Image tags are updated by the CI workflow (ci.yml opens a PR editing this file).

global:
  imagePullPolicy: Always
  environment: dev
  gcpProjectId: "news-feed-omnifeed"
  gcpRegion: "europe-west1"
  gkeClusterName: "omnifeed-dev-cluster"

api-gateway:
  replicaCount: 1
  image:
    repository: "europe-west1-docker.pkg.dev/news-feed-omnifeed/omnifeed-dev-docker-registry/api-gateway"
    tag: "latest"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    className: "nginx"
    host: "api.marianbodnar.uk" # ← replace with your Cloudflare domain
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    tls:
      - secretName: omnifeed-api-tls
        hosts:
          - api.marianbodnar.uk # ← replace

frontend:
  replicaCount: 1
  image:
    repository: "europe-west1-docker.pkg.dev/news-feed-omnifeed/omnifeed-dev-docker-registry/frontend"
    tag: "latest"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: "nginx"
    host: "app.marianbodnar.uk" # ← replace with your Cloudflare domain
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    tls:
      - secretName: omnifeed-frontend-tls
        hosts:
          - app.marianbodnar.uk # ← replace

worker-fetcher:
  replicaCount: 1
  image:
    repository: "europe-west1-docker.pkg.dev/news-feed-omnifeed/omnifeed-dev-docker-registry/worker-fetcher"
    tag: "latest"

worker-summarizer:
  replicaCount: 1
  image:
    repository: "europe-west1-docker.pkg.dev/news-feed-omnifeed/omnifeed-dev-docker-registry/worker-summarizer"
    tag: "latest"

postgresql:
  primary:
    persistence:
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

rabbitmq:
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
