# Secret templates — create these manually or via `kubectl create secret`.
# This file serves as documentation; real secrets should come from
# GCP Secret Manager + External Secrets Operator in prod.
#
# For dev, create them with:
#
#   kubectl create secret generic omnifeed-api-gateway-secrets \
#     --from-literal=DATABASE_URL='postgres://news:news@omnifeed-postgresql:5432/news_feed?sslmode=disable' \
#     --from-literal=REDIS_ADDR='omnifeed-redis-master:6379' \
#     --from-literal=NEWS_API_KEY='your-gnews-key'
#
#   kubectl create secret generic omnifeed-worker-fetcher-secrets \
#     --from-literal=NEWS_API_KEY='your-gnews-key' \
#     --from-literal=RABBITMQ_HOST='omnifeed-rabbitmq'
#
#   kubectl create secret generic omnifeed-worker-summarizer-secrets \
#     --from-literal=POSTGRES_URL='postgresql://news:news@omnifeed-postgresql:5432/news_feed' \
#     --from-literal=REDIS_HOST='omnifeed-redis-master' \
#     --from-literal=REDIS_PORT='6379' \
#     --from-literal=RABBITMQ_HOST='omnifeed-rabbitmq' \
#     --from-literal=GEMINI_API_KEY='your-gemini-key'
#
# NOTE: This file intentionally does NOT create Secret resources to avoid
# committing credentials to git. The kubectl commands above create them
# imperatively. In prod, use External Secrets Operator or Sealed Secrets.
