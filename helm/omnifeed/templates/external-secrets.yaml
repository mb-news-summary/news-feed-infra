{{- $env := .Values.global.environment | default "dev" }}
{{- $app := .Release.Name }}
# ExternalSecret: api-gateway
# Pulls DATABASE_URL, REDIS_ADDR, NEWS_API_KEY from GCP Secret Manager
# and creates K8s Secret "omnifeed-api-gateway-secrets".
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: omnifeed-api-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: omnifeed-{{ $env }}-db-password
    - secretKey: NEWS_API_KEY
      remoteRef:
        key: omnifeed-{{ $env }}-news-api-key
  dataFrom: []
---
# ExternalSecret: worker-fetcher
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: worker-fetcher-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: omnifeed-worker-fetcher-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEWS_API_KEY
      remoteRef:
        key: omnifeed-{{ $env }}-news-api-key
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: omnifeed-{{ $env }}-rabbitmq-password
---
# ExternalSecret: worker-summarizer
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: worker-summarizer-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: omnifeed-worker-summarizer-secrets
    creationPolicy: Owner
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: omnifeed-{{ $env }}-gemini-api-key
    - secretKey: DB_PASSWORD
      remoteRef:
        key: omnifeed-{{ $env }}-db-password
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: omnifeed-{{ $env }}-rabbitmq-password
