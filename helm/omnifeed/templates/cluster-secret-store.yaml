# ClusterSecretStore: tells ESO how to authenticate to GCP Secret Manager.
# Uses Workload Identity — no credentials stored in the cluster.
# One store serves all namespaces (ClusterSecretStore vs namespace-scoped SecretStore).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.global.gcpProjectId }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.global.gcpRegion }}
          clusterName: {{ .Values.global.gkeClusterName }}
          clusterProjectID: {{ .Values.global.gcpProjectId }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
